[package]
name = "sirno"
version = "0.0.0"
edition = "2024"

[dependencies]
clap = { version = "4", features = ["derive"] }
clap_complete = "4"
glob = "0.3"
serde = { version = "1", features = ["derive"] }
serde_json = "1"
serde_yaml = "0.9"
smol_str = { version = "0.3.6", features = ["serde"] }
thiserror = "2"
toml = "1.1.2"
tracing = "0.1"
eter = { path = "../eter" }
mosaika = { path = "../mosaika" }

[dev-dependencies]
tempfile = "3"
